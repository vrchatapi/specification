title: CreateListingRequest
type: object
description: Observed create-listing payload fields. Additional fields may exist.
properties:
  active:
    type: boolean
  description:
    type: string
  displayName:
    type: string
  imageId:
    $ref: ../schemas/FileID.yaml
  listingType:
    $ref: ../schemas/ProductListingType.yaml
  priceTokens:
    type: integer
  productIds:
    type: array
    items:
      $ref: ../schemas/ProductID.yaml
  storeIds:
    type: array
    items:
      $ref: ../schemas/StoreID.yaml
required:
  - description
  - displayName
  - imageId
  - listingType
  - priceTokens
  - productIds
  - storeIds
