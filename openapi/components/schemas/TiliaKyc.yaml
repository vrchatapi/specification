title: TiliaKyc
type: object
properties:
  account_id:
    type: string
    description: Tilia account identifier.
    example: acct_2YYRz9C5xbJWrhI5RLWPnwDLMyq
  kyc_id:
    type: string
    description: KYC verification identifier.
    example: kyc_2tDKpjafhPTG729ceA2oIcsQlWA
  kyc_requirements:
    type: string
    description: Requirement state reported by Tilia.
    example: NONE
  match_checks:
    type: array
    description: Match checks returned by Tilia.
    items:
      type: string
  pii_level:
    type: string
    description: PII verification level.
    example: FULL
  rules:
    type: array
    description: Additional rules returned by Tilia.
    items:
      type: string
  state:
    type: string
    description: Overall KYC state.
    example: ACCEPT
  tilia_retry_rule_code:
    type: string
    description: Retry rule code returned by Tilia, if any.
required:
  - account_id
  - kyc_id
  - kyc_requirements
  - match_checks
  - pii_level
  - rules
  - state
  - tilia_retry_rule_code
