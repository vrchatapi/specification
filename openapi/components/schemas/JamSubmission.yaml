title: JamSubmission
type: object
description: ""
properties:
  contentId:
    type: string
    description: Either world ID or avatar ID
    minLength: 1
  created_at:
    type: string
    format: date-time
  description:
    type: string
  id:
    $ref: ../schemas/JamSubmissionID.yaml
  jamId:
    $ref: ../schemas/JamID.yaml
  ratingScore:
    type: integer
    minimum: 0
  submitterId:
    $ref: ../schemas/UserID.yaml
required:
  - contentId
  - created_at
  - description
  - id
  - jamId
  - ratingsScore
  - submitterId
