title: UserEconomyTransaction
type: object
properties:
  amount:
    type: integer
    description: Signed amount applied by this transaction line.
    example: -103378
  balance:
    type: integer
    description: Resulting combined balance after this transaction line.
    example: 0
  date:
    type: string
    format: date-time
    description: Timestamp of the transaction line.
  earningsBalance:
    type: integer
    description: Resulting earnings balance after this transaction line.
    example: 103378
  fromUserDisplayName:
    type: string
    description: Display name of the other user associated with the transaction, when present.
    example: heldogs13
  fromUserId:
    $ref: ./UserID.yaml
  isEarnings:
    type: boolean
    description: Whether this transaction line affects the earnings balance.
  listingDisplayName:
    type: string
    description: Display name of the purchased listing, when the transaction is tied to a listing.
    example: Fire Collection Circle
  listingId:
    $ref: ./ProductID.yaml
  listingType:
    type: string
    description: Listing type associated with the transaction. Observed values include `instant` and `permanent`.
    example: instant
  platform:
    type: string
    description: Platform associated with the transaction.
    example: VRChat
  purchaseId:
    $ref: ./ProductPurchaseID.yaml
  reason:
    type: integer
    description: Numeric reason code for the transaction line.
    example: 1100
  reasonLabel:
    type: string
    description: Human-readable reason label for the transaction line.
    example: Revenue
  standardBalance:
    type: integer
    description: Resulting standard balance after this transaction line.
    example: 0
  transactionId:
    type: integer
    format: int64
    description: Parent transaction identifier.
    example: 1728687
  transactionLineId:
    type: integer
    format: int64
    description: Transaction line identifier.
    example: 5302728
required:
  - amount
  - balance
  - date
  - earningsBalance
  - isEarnings
  - platform
  - reason
  - reasonLabel
  - standardBalance
  - transactionId
  - transactionLineId
